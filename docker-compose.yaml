# Local run: docker compose up --build
# App: http://localhost:8080  (frontend proxies /api to backend)
#
# Copy each folder's .env.example to .env if needed, then edit values.

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ./postgres/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    env_file:
      - ./frontend/.env
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
